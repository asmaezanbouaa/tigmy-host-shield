[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && mkdir -p data storage/signatures storage/pdfs storage/id_documents storage/archive_exports && python scripts/migrate_v2.py 2>/dev/null || true && python scripts/init_db.py"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"

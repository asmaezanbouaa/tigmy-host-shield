<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — {{ app_name }}</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <p class="guest-hero__badge" style="margin-bottom:1rem">{{ app_name }}</p>
      <h1>Host dashboard</h1>
      <p class="subtitle">Sign in to review registrations and confirm guests.</p>
      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}
      <form method="post" action="/admin/login">
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" required autocomplete="username" placeholder="Your admin username">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>

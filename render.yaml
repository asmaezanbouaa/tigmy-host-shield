# Tigmy Host Shield on Render — https://tigmy-host-shield.onrender.com
# Deploy: Render Dashboard → New → Blueprint → connect GitHub repo
services:
  - type: web
    name: tigmy-host-shield
    runtime: python
    plan: free
    region: frankfurt
    healthCheckPath: /health
    buildCommand: ./scripts/render_build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: APP_NAME
        value: Tigmy Host Shield
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: BASE_URL
        value: https://tigmy-host-shield.onrender.com
      - key: FORCE_HTTPS
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: AI_PROVIDER
        value: "off"
      - key: DATABASE_URL
        value: sqlite:///./data/guest_registry.db
